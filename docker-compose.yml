services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./site_conf/Caddyfile:/etc/caddy/Caddyfile
      - ./www:/var/www/404tears
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
