<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GREEN-API Test Task</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container">
    <h1>GREEN-API Test Page</h1>

    <div>
      <div class="block">
        <div class="label">Connection</div>
        <input id="idInstance" placeholder="idInstance" />
        <input id="apiTokenInstance" placeholder="ApiTokenInstance" />
      </div>

      <div class="block">
        <button onclick="getSettings()">getSettings</button>
        <button onclick="getStateInstance()">getStateInstance</button>
      </div>

      <div class="block">
        <div class="label">sendMessage</div>
        <input id="chatId" placeholder="chatId: 77001234567@c.us" />
        <input id="message" placeholder="message" />
        <button onclick="sendMessage()">sendMessage</button>
      </div>

      <div class="block">
        <div class="label">sendFileByUrl</div>
        <input id="fileChatId" placeholder="chatId: 77001234567@c.us" />
        <input id="urlFile" placeholder="urlFile: https://example.com/file.jpg" />
        <input id="fileName" placeholder="fileName: image.jpg" />
        <input id="caption" placeholder="caption" />
        <button onclick="sendFileByUrl()">sendFileByUrl</button>
      </div>
    </div>

    <div>
      <div class="label">Response</div>
      <textarea id="response" readonly placeholder="API response will be shown here"></textarea>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
